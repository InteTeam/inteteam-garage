[PHP]
; Performance
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
post_max_size = 50M
upload_max_filesize = 50M

; Error reporting — off in production, Laravel captures errors via its handler
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Temp directory — explicit path prevents "file created in system's temporary directory" warnings
sys_temp_dir = /tmp
upload_tmp_dir = /tmp

; OPcache
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 0
opcache.fast_shutdown = 1
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Xdebug — OFF in dev for performance (OneDrive bind mount makes IO slow)
xdebug.mode = off

[Date]
date.timezone = Europe/London
