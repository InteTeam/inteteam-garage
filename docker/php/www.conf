[www]
; Listen on TCP socket accessible to nginx
listen = 9000

; Process manager configuration for 500 tenants
pm = dynamic
pm.max_children = 200
pm.start_servers = 50
pm.min_spare_servers = 25
pm.max_spare_servers = 75
pm.max_requests = 1000

; Process timeout (prevent hanging requests)
request_terminate_timeout = 300

; Performance
pm.process_idle_timeout = 10s

; Logging
catch_workers_output = yes
