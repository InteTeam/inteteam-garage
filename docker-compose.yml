services:
  php-fpm:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: garage_php
    restart: unless-stopped
    working_dir: /var/www
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    environment:
      PHP_IDE_CONFIG: "serverName=Docker"
      DB_HOST: mariadb
    networks:
      - garage
      - proxy-tier
    depends_on:
      - mariadb
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: garage_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8085}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - garage
      - proxy-tier
    depends_on:
      - php-fpm

  mariadb:
    image: mariadb:11.8
    container_name: garage_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-GarageRoot2026!}
      MYSQL_DATABASE: inteteam_garage
      MYSQL_USER: garage
      MYSQL_PASSWORD: ${DB_PASSWORD:-GaragePass2026!}
    expose:
      - "3306"
    volumes:
      - garage_mariadb_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - garage

  redis:
    image: redis:7-alpine
    container_name: garage_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-GarageRedis2026!}
    expose:
      - "6379"
    volumes:
      - garage_redis_data:/data
    networks:
      - garage
    command: redis-server --requirepass ${REDIS_PASSWORD:-GarageRedis2026!} --appendonly yes

  queue-worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: garage_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan queue:work --queue=high,default --sleep=3 --tries=3 --max-time=3600
    networks:
      - garage
    depends_on:
      - php-fpm
      - redis

  npm:
    image: node:22-alpine
    container_name: garage_npm
    working_dir: /var/www
    profiles:
      - dev
    volumes:
      - ./:/var/www
    ports:
      - "5174:5173"
    networks:
      - garage
    command: sh -c "npm install && npm run dev -- --host"

  mailpit:
    image: axllent/mailpit:latest
    container_name: garage_mailpit
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "8026:8025"
      - "1026:1025"
    networks:
      - garage

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: garage_phpmyadmin
    restart: unless-stopped
    profiles:
      - dev
    environment:
      PMA_HOST: mariadb
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT:-8086}:80"
    networks:
      - garage
    depends_on:
      - mariadb

  caddy:
    image: caddy:2-alpine
    container_name: garage_caddy
    restart: unless-stopped
    profiles:
      - prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - garage_caddy_data:/data
      - garage_caddy_config:/config
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
    networks:
      - garage
    depends_on:
      - nginx

networks:
  garage:
    driver: bridge
  proxy-tier:
    external: true

volumes:
  garage_mariadb_data:
    driver: local
  garage_redis_data:
    driver: local
  garage_caddy_data:
    driver: local
  garage_caddy_config:
    driver: local
